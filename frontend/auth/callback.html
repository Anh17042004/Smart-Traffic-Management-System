<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authenticating...</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
        }
        .message {
            text-align: center;
        }
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border-left-color: #09f;
            animation: spin 1s ease infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="message">
        <div class="spinner"></div>
        <h2>Xác thực thành công. Đang chuyển hướng...</h2>
    </div>

    <script>
        // Lấy token từ URL param
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (token) {
            // Lưu token vào localStorage với đúng key mà auth.js sử dụng
            localStorage.setItem('traffic_token', token);
            
            // Redirect về trang dashboard
            window.location.replace('../dashboard/index.html');
        } else {
            // Không có token, quay về lỗi hoặc trang chủ báo lỗi
            console.error("No token found in URL parameters");
            alert("Đăng nhập thất bại: Không tìm thấy token xác thực.");
            window.location.replace('../index.html');
        }
    </script>
</body>
</html>

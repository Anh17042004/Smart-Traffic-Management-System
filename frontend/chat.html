<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chat - Smart Traffic</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <!-- Custom Chat CSS -->
    <style>
        .chat-container {
            height: calc(100vh - 140px);
            display: flex;
            flex-direction: column;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
        }

        .message {
            max-width: 75%;
            margin-bottom: 1rem;
            padding: 12px 16px;
            border-radius: 12px;
            position: relative;
            line-height: 1.5;
        }

        .msg-user {
            background-color: var(--accent-cyan);
            color: #fff;
            margin-left: auto;
            border-bottom-right-radius: 4px;
        }

        .msg-assistant {
            background-color: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            margin-right: auto;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: var(--text-muted);
            border-radius: 50%;
            margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav sticky-top navbar-dark px-3">
        <div class="container-fluid">
            <a class="navbar-brand text-cyan fw-bold" href="dashboard.html">
                <i class="fa-solid fa-camera-retro me-2"></i>Smart Traffic
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="chat.html">AI Chat</a></li>
                    <li class="nav-item"><a class="nav-link d-none" id="nav-admin" href="admin.html">Admin</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-outline-danger btn-sm" onclick="logout()">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-4">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="glass-card chat-container">

                    <!-- Header Chat -->
                    <div class="p-3 border-bottom border-secondary bg-dark bg-opacity-25 rounded-top">
                        <h5 class="mb-0 text-cyan fw-bold">
                            <i class="fa-solid fa-robot me-2"></i>Trợ lý Giao thông AI
                        </h5>
                        <small class="text-muted">Hỏi đáp tình trạng các tuyến đường thời gian thực</small>
                        <button id="btnClearChat" class="btn btn-sm btn-outline-secondary float-end mt-n4">Xóa lịch
                            sử</button>
                    </div>

                    <!-- Messages Area -->
                    <div class="chat-messages" id="chat-messages">
                        <!-- Tin nhắn mẫu -->
                        <div class="message msg-assistant">
                            Xin chào! Tôi có thể giúp gì cho bạn về tình hình tình trạng giao thông hôm nay?
                            <br><small class="text-muted d-block mt-1">Gợi ý: "Đường Láng đang có tắc không?"</small>
                        </div>
                    </div>

                    <!-- Input Area -->
                    <div class="p-3 border-top border-secondary">
                        <form id="chat-form" class="d-flex gap-2">
                            <input type="text" id="chat-input" class="form-control bg-dark text-white border-secondary"
                                placeholder="Nhập câu hỏi của bạn..." autocomplete="off" required>
                            <button type="submit" class="btn btn-cyberpunk px-4">
                                <i class="fa-solid fa-paper-plane"></i>
                            </button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <!-- Markdown Renderer -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/chat.js"></script>
</body>

</html>

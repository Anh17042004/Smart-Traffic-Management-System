<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Traffic System — Đăng nhập</title>
    <meta name="description" content="Hệ thống giám sát giao thông thông minh bằng AI">
    <link rel="stylesheet" href="/assets/css/style.css">
</head>

<body>

    <div class="login-box">
        <span class="login-logo">🚦</span>
        <h1>Smart Traffic System</h1>
        <p class="login-subtitle">Hệ thống giám sát giao thông thông minh<br>bằng AI · Real-time · Đa tuyến đường</p>

        <button id="loginBtn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
            <span>Đăng nhập bằng Google</span>
        </button>

        <p class="login-footer">
            Khi đăng nhập, bạn đồng ý với các điều khoản sử dụng.<br>
            Dữ liệu camera chỉ được sử dụng cho mục đích giám sát giao thông.
        </p>
        <span class="version-badge">v2.0 · DATN 2026</span>
    </div>

    <script>
        document.getElementById("loginBtn").onclick = () => {
            window.location.href = "http://localhost:8000/api/v1/auth/google";
        };
    </script>

</body>

</html>

<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Traffic System - Login</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <div class="login-container">
        <div class="glass-card p-5 text-center" style="max-width: 400px; width: 100%;">
            <div class="mb-4">
                <i class="fa-solid fa-camera-retro text-cyan fa-3x mb-3 pulse-glow" style="border-radius: 50%;"></i>
                <h2 class="text-white fw-bold">Smart Traffic</h2>
                <p class="text-muted">Hệ thống Giám sát & AI Chatbot</p>
            </div>

            <button id="btnLoginGoogle"
                class="btn btn-cyberpunk w-100 d-flex align-items-center justify-content-center gap-2">
                <i class="fa-brands fa-google"></i>
                Đăng nhập với Google
            </button>

            <div class="mt-4 text-muted small">
                &copy; 2026 DATN Transport System
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script>
        // Khi user bấm nút, redirect sang backend API auth google
        document.getElementById('btnLoginGoogle').addEventListener('click', () => {
            // Thay cổng backend nếu cần (hiện tại backend chạy port 8000)
            window.location.href = 'http://localhost:8000/api/v1/auth/google';
        });

        // Nếu đã có token thì đá thẳng vào dashboard
        if (localStorage.getItem('access_token')) {
            window.location.replace('dashboard.html');
        }
    </script>
</body>

</html>

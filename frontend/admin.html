<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Smart Traffic</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav sticky-top navbar-dark px-3">
        <div class="container-fluid">
            <a class="navbar-brand text-cyan fw-bold" href="dashboard.html">
                <i class="fa-solid fa-camera-retro me-2"></i>Smart Traffic
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="chat.html">AI Chat</a></li>
                    <li class="nav-item"><a class="nav-link active" id="nav-admin" href="admin.html">Admin</a></li>
                </ul>
                <div class="d-flex align-items-center gap-3">
                    <button class="btn btn-outline-danger btn-sm" onclick="logout()">
                        <i class="fa-solid fa-right-from-bracket"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-4">

        <!-- System Metrics Row -->
        <div class="row g-4 mb-4" id="system-metrics">
            <div class="col-md-4">
                <div class="glass-card p-3 text-center">
                    <h6 class="text-muted text-uppercase mb-2">CPU Usage</h6>
                    <h3 class="fw-bold text-cyan" id="metric-cpu">0%</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card p-3 text-center">
                    <h6 class="text-muted text-uppercase mb-2">RAM Usage</h6>
                    <h3 class="fw-bold text-green" id="metric-ram">0 GB / 0 GB</h3>
                </div>
            </div>
            <div class="col-md-4">
                <div class="glass-card p-3 text-center">
                    <h6 class="text-muted text-uppercase mb-2">Disk Usage</h6>
                    <h3 class="fw-bold text-warning" id="metric-disk">0%</h3>
                </div>
            </div>
        </div>

        <!-- Users Table -->
        <div class="glass-card p-4">
            <h4 class="fw-bold mb-4 border-bottom border-secondary pb-2"><i class="fa-solid fa-users me-2"></i>Quản lý
                người dùng</h4>
            <div class="table-responsive">
                <table class="table table-dark table-hover align-middle">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Avatar</th>
                            <th>Email</th>
                            <th>Tên</th>
                            <th>Vai trò</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <tr>
                            <td colspan="6" class="text-center text-muted">Đang tải dữ liệu...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <!-- Scripts -->
    <script src="assets/js/auth.js"></script>
    <script src="assets/js/admin.js"></script>
</body>

</html>

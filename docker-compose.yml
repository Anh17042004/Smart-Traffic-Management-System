services:
  postgres:
    image: postgres:16-alpine
    container_name: traffic_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: traffic_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"       # 5433 để tránh xung đột với face_smart_postgres (5432)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d traffic_db"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Optional: pgAdmin để xem DB bằng giao diện ──────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: traffic_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@traffic.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5051:80"         # 5051 để tránh xung đột với pgAdmin cũ (nếu có)
    depends_on:
      - postgres

volumes:
  postgres_data:
